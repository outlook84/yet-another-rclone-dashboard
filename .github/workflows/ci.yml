name: CI

on:
  push:
    branches:
      - "main"
      - "development"
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".github/pull_request_template.md"
  pull_request:
    branches:
      - "main"
      - "development"
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".github/pull_request_template.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.16.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
